<div class="flex min-h-screen">

  <!-- LEFT IMAGE -->
  <div class="hidden md:block w-1/2">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
         class="h-full w-full object-cover" />
  </div>

  <!-- RIGHT -->
  <div class="flex w-full md:w-1/2 items-center justify-center">

    <div class="w-full max-w-md px-6">

      <h1 class="text-3xl font-bold mb-2">Sign in</h1>
      <p class="text-gray-500 mb-6">Stay updated on your professional world</p>

      <input [(ngModel)]="email"
             placeholder="Email"
             class="w-full p-3 border mb-3 rounded" />

      <input [(ngModel)]="password"
             type="password"
             placeholder="Password"
             class="w-full p-3 border mb-3 rounded" />

      <button (click)="login()"
              [disabled]="loading"
              class="w-full bg-blue-600 text-white p-3 rounded">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

    </div>
  </div>
</div>
