<div class="flex min-h-screen">

  <div class="hidden md:block w-1/2">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"
         class="h-full w-full object-cover" />
  </div>

  <div class="flex w-full md:w-1/2 items-center justify-center">

    <div class="w-full max-w-md px-6">

      <h1 class="text-3xl font-bold mb-4">Join now</h1>

      <input [(ngModel)]="fullName"
             placeholder="Full Name"
             class="w-full p-3 border mb-3 rounded" />

      <input [(ngModel)]="email"
             placeholder="Email"
             class="w-full p-3 border mb-3 rounded" />

      <input [(ngModel)]="password"
             type="password"
             placeholder="Password"
             class="w-full p-3 border mb-3 rounded" />

      <button (click)="register()"
              class="w-full bg-blue-600 text-white p-3 rounded">
        Register
      </button>

    </div>
  </div>
</div>
